<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Deep luxury teal gradient for background -->
    <linearGradient id="gsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00796b" />
      <stop offset="100%" stop-color="#004d40" />
    </linearGradient>
    <!-- Modern drop shadow for text elevation -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  
  <!-- Sleek premium squircle backdrop -->
  <rect width="128" height="128" rx="28" fill="url(#gsGrad)" />
  
  <!-- Subtle glowing inner border accent -->
  <rect x="2" y="2" width="124" height="124" rx="26" fill="none" stroke="#4db6ac" stroke-width="2" stroke-opacity="0.4" />
  
  <!-- Bold, custom-aligned brand initials 'GS' -->
  <text x="50%" y="54%" 
        dominant-baseline="middle" 
        text-anchor="middle" 
        fill="#ffffff" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="62" 
        font-weight="900" 
        letter-spacing="-2"
        filter="url(#shadow)">GS</text>
</svg>
